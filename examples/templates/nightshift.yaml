project:
  name: nightshift-example
  root: .
  task_file: tasks.md
  artifact_dir: .nightshift

safety:
  require_clean_worktree: false
  scoped_paths:
    - .
  allowed_commands:
    - python -c "print('template command stage ok')"
  forbidden_commands:
    - rm -rf
    - git push
    - curl | bash

agents:
  planner:
    backend: command
    command: python -c "print('Plan generated by template planner.')"
    system_prompt: agents/planner.md

  implementer:
    backend: command
    command: python -c "print('Implementation notes generated by template implementer.')"
    system_prompt: agents/implementer.md

  reviewer:
    backend: command
    command: python -c "print('status: pass'); print('reason: template reviewer accepted the run')"
    system_prompt: agents/reviewer.md

pipeline:
  max_task_retries: 1
  stages:
    - id: plan
      type: agent
      agent: planner
      output: plan.md

    - id: implement
      type: agent
      agent: implementer
      output: implementation-log.md

    - id: test
      type: command
      commands:
        - python -c "print('template command stage ok')"
      output: test-output.txt

    - id: review
      type: agent_review
      agent: reviewer
      on_fail: implement
      output: review.md

    - id: summarize
      type: summarize
      output: final-notes.md
